name: Hotspot Report

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  code-quality-hotspot-issue:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Keep enough commit history to compare against the last recorded report head.
          fetch-depth: 21

      - name: Update hotspot report issue every 20 commits
        run: python3 scripts/report_code_quality_hotspots_issue.py --threshold 20 --top 8 --title "Code Quality Hotspots" --label code-quality-hotspot
