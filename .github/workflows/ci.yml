name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'sgconfig.yml'
      - 'sg-rules/**'
      - 'apps/**'
      - 'crates/**'
      - 'fixtures/**'
      - 'sim/**'
      - 'scripts/**'
      - 'docs/CODE-QUALITY-CHECKLIST.md'
      - 'docs/CODE-QUALITY-CHECKLIST.zh-TW.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'sgconfig.yml'
      - 'sg-rules/**'
      - 'apps/**'
      - 'crates/**'
      - 'fixtures/**'
      - 'sim/**'
      - 'scripts/**'
      - 'docs/CODE-QUALITY-CHECKLIST.md'
      - 'docs/CODE-QUALITY-CHECKLIST.zh-TW.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'

jobs:
  rust-and-validation:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Compile workspace
        run: cargo check

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run negative validation smoke
        run: ./sim/negative-validation/smoke.sh --summary-only

  ast-grep-quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install ast-grep
        run: cargo install ast-grep

      - name: Run ast-grep quality scan
        run: sg scan --config sgconfig.yml --report-style short --format github

  code-quality-hotspots-warning:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Warn on large files, long functions, and repeated literals
        run: python3 scripts/check_code_quality_hotspots.py --github-warning
